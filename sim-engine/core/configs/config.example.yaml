# sim-engine/core/configs/config.example.yaml
# SimEngine Core 配置文件示例
# 复制为 config.yaml 后按本机环境调整。
# 也可通过环境变量覆盖，前缀 LENSCHAIN_SIM_，例如 LENSCHAIN_SIM_SERVER_GRPC_ADDR=:50051。

server:
  # http_addr: HTTP/WebSocket 监听地址（容器内监听 :50052，宿主映射 50062）。
  http_addr: ":50052"
  # grpc_addr: gRPC 监听地址（容器内监听 :50051，宿主映射 50061）。
  grpc_addr: ":50051"
  # public_base: 前端 WebSocket 连接的公开基地址。
  # - 本地开发: ws://127.0.0.1:50062
  # - 生产环境: wss://api.lianjing.com/ws/sim-engine（由 Ingress 暴露）
  public_base: "ws://127.0.0.1:50062"
  read_header_timeout: 5s
  shutdown_timeout: 5s

auth:
  # ws_jwt_secret: 必须与 backend.jwt.access_secret 完全一致，用于校验前端连入 WS 的 JWT。
  ws_jwt_secret: "lenschain-jwt-access-secret-2026"
  ws_jwt_issuer: "lenschain"
  ws_jwt_audience: "sim-engine"

orchestrator:
  # in_cluster: 运行在 K8s Pod 内时 true（使用 ServiceAccount）；集群外开发置 false。
  in_cluster: false
  # kubeconfig_path: 集群外 kubeconfig 文件路径，空走 ~/.kube/config。
  kubeconfig_path: ""
  # namespace: 场景算法容器所在命名空间（建议与 SimEngine Core 同 ns）。
  namespace: "lenschain"
  # image_pull_secret_name: 镜像拉取凭据 Secret 名称；本地开发可留空。
  image_pull_secret_name: "registry-pull-secret"
  # ready_timeout: 场景 Pod 启动 + gRPC HealthCheck 通过总超时
  # （对齐 docs/modules/04-实验环境/06-可视化仿真引擎设计.md §6.4 = 10s）。
  ready_timeout: 10s
  # idle_ttl: 场景 Pod 空闲多久后被自动回收。
  idle_ttl: 10m
  # default_cpu / default_memory: 当 sim_scenarios 未提供资源请求时的默认值。
  # 对齐文档 §2.2 "场景算法容器 CPU 少量 + 内存少量"。
  default_cpu: "100m"
  default_memory: "128Mi"
  # limit_cpu / limit_memory: 资源上限。
  limit_cpu: "500m"
  limit_memory: "256Mi"

object_storage:
  # endpoint: MinIO/S3 地址（dev 环境可指向本地 lenschain-minio）。
  endpoint: "lenschain-minio:9000"
  access_key: "minioadmin"
  secret_key: "minioadmin"
  use_ssl: false
  bucket: "lenschain"
  region: "us-east-1"
  object_prefix: "snapshots/"
  # encryption_key: 必须为 32 字节字符串。
  encryption_key: "lenschain-snapshot-encryption-32"
  presign_duration: 1h

snapshot:
  init_timeout: 10s

loop:
  clock_interval: 100ms
  teacher_summary_interval: 5s
  auto_snapshot_interval: 5m
