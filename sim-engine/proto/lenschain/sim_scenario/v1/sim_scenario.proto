// 模块：SimEngine 场景算法容器 gRPC 契约
// 文件职责：定义 Core ↔ 场景算法容器之间的 gRPC 服务与消息。
// 协议依据：docs/modules/04-实验环境/06-可视化仿真引擎设计.md §6.2 / §6.3 / §6.4。
//
// 设计要点：
// 1. 渲染数据 RenderEnvelope（Primitive / MicroStep / LinkTrigger / ContainerMetric）以
//    序列化 JSON 字节（render_envelope_json）携带，结构契约由 Go/TS 类型层维护。
// 2. SceneState / SharedState 同样以 JSON 字节传输；场景容器无状态，状态由 Core 持有。
// 3. 不在本 proto 定义前端 WebSocket 协议（WS 协议为 JSON，定义在 03-API接口设计.md §四）。
syntax = "proto3";

package lenschain.sim_scenario.v1;

option go_package = "github.com/lenschain/sim-engine/proto/gen/go/lenschain/sim_scenario/v1;simscenariov1";

// SimScenarioService 是每个场景算法容器必须实现的 gRPC 服务。
// Core 通过此接口驱动场景算法容器；场景容器无状态，每次请求基于输入参数重放算法。
service SimScenarioService {
  // GetMeta 返回场景元信息（启动时由 Core 调用一次）。
  rpc GetMeta(GetMetaRequest) returns (GetMetaResponse);

  // GetInteractionSchema 返回该场景的 InteractionDefinition（ActionDef 列表）。
  // 前端通过 HTTP `GET /interaction-schema` 间接调用，Core 负责缓存与失效。
  rpc GetInteractionSchema(GetInteractionSchemaRequest) returns (GetInteractionSchemaResponse);

  // Init 初始化场景：返回首帧 RenderEnvelope（is_full_snapshot=true）与初始 SceneState。
  rpc Init(InitRequest) returns (InitResponse);

  // Step 执行单 tick：用于 process / continuous 模式。返回新的 SceneState、RenderEnvelope、SharedState diff。
  rpc Step(StepRequest) returns (StepResponse);

  // HandleAction 处理学生 / 教师交互：用于 reactive 模式触发算法以及任意模式的 ActionDef 调用。
  rpc HandleAction(HandleActionRequest) returns (HandleActionResponse);

  // HealthCheck 健康检查；Core 周期调用，失败计数到阈值后触发 error_overlay。
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
}

// ============== 枚举 ==============

// TimeControlMode 与 06.md §五 三种时间控制模式对齐。
enum TimeControlMode {
  TIME_CONTROL_MODE_UNSPECIFIED = 0;
  TIME_CONTROL_MODE_PROCESS = 1;     // 过程化：明确步骤的场景（PBFT / 交易生命周期等）
  TIME_CONTROL_MODE_REACTIVE = 2;    // 交互响应式：输入即响应（SHA-256 / Merkle 等）
  TIME_CONTROL_MODE_CONTINUOUS = 3;  // 持续运行式：持续演化观察（P2P / Gossip 等）
}

// DataSourceMode 表示场景使用的数据来源（混合实验时为 dual）。
enum DataSourceMode {
  DATA_SOURCE_MODE_UNSPECIFIED = 0;
  DATA_SOURCE_MODE_SIMULATION = 1;
  DATA_SOURCE_MODE_COLLECTION = 2;
  DATA_SOURCE_MODE_DUAL = 3;
}

// HealthStatus 表示场景容器健康状态。
enum HealthStatus {
  HEALTH_STATUS_UNSPECIFIED = 0;
  HEALTH_STATUS_SERVING = 1;
  HEALTH_STATUS_NOT_SERVING = 2;
  HEALTH_STATUS_STARTING = 3;
}

// ActionCategory 与 06.md §6.3 ActionDef.category 业务语义对齐。
enum ActionCategory {
  ACTION_CATEGORY_UNSPECIFIED = 0;
  ACTION_CATEGORY_PARAM_TUNE = 1;     // [⚙ 调参] 改数值参数
  ACTION_CATEGORY_ATTACK_INJECT = 2;  // [⚠ 攻击] 注入恶意行为，前端二次确认
  ACTION_CATEGORY_PRIMARY = 3;        // [▶ 操作] 走正常流程的主动动作
  ACTION_CATEGORY_OBSERVE = 4;        // [👁 观察] 切视图、不改状态
}

// ActionTrigger 与 06.md §6.3 ActionDef.trigger 对齐。
enum ActionTrigger {
  ACTION_TRIGGER_UNSPECIFIED = 0;
  ACTION_TRIGGER_SUBMIT = 1;     // 表单提交
  ACTION_TRIGGER_IMMEDIATE = 2;  // 即时触发（按钮点击立即执行）
  ACTION_TRIGGER_HOLD = 3;       // 长按 / 持续触发
}

// FieldType 与 06.md §6.3 FieldDef.type 对齐。
enum FieldType {
  FIELD_TYPE_UNSPECIFIED = 0;
  FIELD_TYPE_STRING = 1;
  FIELD_TYPE_NUMBER = 2;
  FIELD_TYPE_BOOLEAN = 3;
  FIELD_TYPE_SELECT = 4;
  FIELD_TYPE_ENUM = 5;
  FIELD_TYPE_RANGE = 6;
  FIELD_TYPE_JSON = 7;
  FIELD_TYPE_MULTI_SELECT = 8;
}

// HybridChannel 表示混合实验中 ActionDef 的执行通道。
enum HybridChannel {
  HYBRID_CHANNEL_UNSPECIFIED = 0;
  HYBRID_CHANNEL_SIM = 1;        // 默认：仿真侧执行
  HYBRID_CHANNEL_CONTAINER = 2;  // 真链容器侧执行（按 container_cmd 模板执行）
}

// ============== 元信息 ==============

// ScenarioMeta 是场景库与 Core 的唯一元信息来源（与 06.md §6.4 ScenarioMeta 对齐）。
message ScenarioMeta {
  string code = 1;                                   // 场景 code，全局唯一（如 "pbft-consensus"）
  string name = 2;                                   // 中文显示名
  string category = 3;                               // 9 选 1 类目编码（详 §3.5）
  string algorithm_type = 4;                         // 算法标识（与 sim_scenarios.algorithm_type 对齐）
  string description = 5;
  string version = 6;                                // 场景版本（与 sim_scenarios.current_version 对齐）
  TimeControlMode time_control_mode = 7;
  DataSourceMode data_source_mode = 8;
  bytes default_params_json = 9;                     // 默认参数（JSON）
  bytes default_state_json = 10;                     // 默认 SceneState（JSON）
  string custom_renderer_package = 11;               // L3 npm 包名（仅 category=generic）
  repeated string supported_link_group_codes = 12;   // 该场景声明支持的联动组 code 列表（保留作冷启动默认值，DB 配置优先级更高）

  // ===== v0.5 新增字段（详 AGENTS.md §0.7.6 / §0.7.1 C10 / C29 / C37） =====

  // extension_level 场景扩展层级：L1 平台内置 / L2 平台扩展 / L3 教师自定义。
  string extension_level = 13;
  // link_group_version 显式锁定本场景使用的 LinkGroup schema 版本（owner-based v0.5+）。
  string link_group_version = 14;
  // supports_multi_actor 标识本场景是否支持多 actor 共享会话（详 §0.7.3）。
  bool supports_multi_actor = 15;
  // owned_field_paths 本场景能产出的全部 owner 字段路径（与 link_group 解耦，详 §0.7.6）。
  repeated string owned_field_paths = 16;
}

// ============== 渲染数据请求 / 响应 ==============

// InitRequest 是场景初始化请求。
message InitRequest {
  string session_id = 1;
  string scene_code = 2;
  string instance_id = 3;
  string student_id = 4;
  int64 seed = 5;
  bytes params_json = 6;          // 实验配置参数（JSON）
  bytes shared_state_json = 7;    // 联动共享状态（JSON，可选）
}

// InitResponse 返回首帧 RenderEnvelope 与初始 SceneState。
message InitResponse {
  string scene_code = 1;
  int64 tick = 2;
  bytes scene_state_json = 3;       // 场景算法状态快照（仅 Core 持有，场景下次调用时回传）
  bytes render_envelope_json = 4;   // RenderEnvelope（is_full_snapshot=true）
  bytes shared_state_diff_json = 5; // 联动共享状态写入（仅 owner 字段，可选）
}

// StepRequest 表示单 tick 推进请求。
message StepRequest {
  string session_id = 1;
  string scene_code = 2;
  int64 tick = 3;                    // 即将推进到的 tick 序号
  bytes scene_state_json = 4;        // 上一帧 SceneState
  bytes shared_state_json = 5;       // 当前联动共享状态（聚合视图）
  repeated LinkTriggerRef incoming_link_triggers = 6; // Core fan-out 进来的联动事件，待场景在本 tick 体现

  // incoming_container_metrics 是 Core Collector 上一周期采集到的容器指标，
  // 在本次 Step 之前注入；混合实验场景借此驱动可视化（详 §0.7.9 Core 1）。
  repeated ContainerMetric incoming_container_metrics = 7;
}

// ContainerMetric 是混合实验中由 collector-agent 上报、Core 注入到 StepRequest 的单条指标。
// value 为任意 JSON 值（字节），target_primitive / target_param 用于前端把值塞入对应原语 Param。
message ContainerMetric {
  string source_container = 1;
  string metric_key = 2;
  bytes value_json = 3;
  int64 timestamp_ms = 4;
  string target_primitive = 5;
  string target_param = 6;
}

// StepResponse 表示 tick 推进结果。
message StepResponse {
  string scene_code = 1;
  int64 tick = 2;
  bytes scene_state_json = 3;
  bytes render_envelope_json = 4;     // RenderEnvelope（is_full_snapshot 通常 false）
  bytes shared_state_diff_json = 5;   // 仅本场景 owner 字段的写入
}

// HandleActionRequest 表示交互请求。
message HandleActionRequest {
  string session_id = 1;
  string scene_code = 2;
  int64 tick = 3;
  bytes scene_state_json = 4;
  bytes shared_state_json = 5;
  string action_code = 6;
  bytes params_json = 7;       // 与 ActionDef.fields 对齐
  string actor_id = 8;
  string user_role = 9;        // student | teacher
}

// HandleActionResponse 表示交互结果。
message HandleActionResponse {
  string scene_code = 1;
  int64 tick = 2;
  bool success = 3;
  string error_message = 4;
  bytes scene_state_json = 5;
  bytes render_envelope_json = 6;
  bytes shared_state_diff_json = 7;
}

// LinkTriggerRef 是 Core 在 Step 时透传给场景的联动事件最小结构。
// 场景容器据此在本 tick 的 RenderEnvelope.link_triggers[] 中可视化（详 06.md §8.5.2）。
message LinkTriggerRef {
  string id = 1;
  string source_scene = 2;
  string source_action = 3;
  string link_group = 4;
  repeated string changed_fields = 5;
  bytes payload_json = 6;
  int64 timestamp_ms = 7;
  string source_anchor_id = 8;
  string target_anchor_id = 9;
}

// ============== 交互定义 ==============

// GetMetaRequest 是场景元信息查询请求。
message GetMetaRequest {}

// GetMetaResponse 返回场景元信息。
message GetMetaResponse {
  ScenarioMeta meta = 1;
}

// GetInteractionSchemaRequest 是场景交互 schema 查询请求。
message GetInteractionSchemaRequest {}

// GetInteractionSchemaResponse 返回 InteractionDefinition。
message GetInteractionSchemaResponse {
  InteractionDefinition definition = 1;
}

// InteractionDefinition 是场景对外暴露的全部 ActionDef。
message InteractionDefinition {
  string scene_code = 1;
  string schema_version = 2;        // schema 版本号，用于前端缓存失效判断
  repeated ActionDef actions = 3;
}

// ActionDef 与 06.md §6.3 ActionDef 对齐。
message ActionDef {
  // 旧字段 9 (triggers_link_groups) 已按 AGENTS.md §0.7.6 弃用并移除；
  // 由 Core 按 DB sim_link_group_scenes 反查 field_path → [target_link_groups] 自动 fan-out。
  reserved 9;
  reserved "triggers_link_groups";

  string action_code = 1;                          // 全局唯一标识（小写下划线）
  string label = 2;                                // 学生看到的按钮文字
  string description = 3;
  string category = 4;                               // "param_tune" | "attack_inject" | "primary" | "observe"
  string trigger = 5;                                // "submit" | "immediate" | "hold"
  repeated FieldDef fields = 6;
  repeated string roles = 7;                       // ["student"] / ["teacher"] / 两者
  int32 cooldown_ms = 8;
  repeated string link_owner_fields = 10;          // 该 action 写入的 owner 字段（详 §8.3）
  string hybrid_channel = 11;                         // "sim" | "container"（空串视为 sim）
  string container_cmd = 12;                       // 容器通道命令模板（含 {{field}} 占位符）

  // ===== v0.5 新增字段（详 AGENTS.md §0.7.6 / §0.7.7 / §0.7.8） =====

  // writes_owned_fields 列出本动作会修改的 owner 字段路径（必须 ⊆ ScenarioMeta.owned_field_paths）。
  // Core 按本字段反查路由表自动 fan-out 联动；新增联动无需重编译镜像。
  repeated string writes_owned_fields = 13;
  // reversible 标识本动作是否可参与 process 模式回退栈（container-channel / 外部副作用必须 false）。
  bool reversible = 14;
  // intervene_type 教师干预类型（hint/fault/attack/phase/topology/state/reset/epoch/revert/freeze）。
  // Roles 含 teacher 时必填，用于 Core 写审计日志（详 §10.9）。
  string intervene_type = 15;
}

// FieldDef 与 06.md §6.3 FieldDef 对齐。
// default / min / max / step / options 因可能是任意类型，统一以 JSON 字节传输。
message FieldDef {
  string name = 1;
  string type = 2;                                    // "string" | "number" | "boolean" | "select" | "enum" | "range" | "json" | "multi_select"
  string label = 3;
  bool required = 4;
  bytes default_json = 5;
  bytes min_json = 6;
  bytes max_json = 7;
  bytes step_json = 8;
  bytes options_json = 9;          // 静态候选项数组（JSON）
  string options_from = 10;        // 动态候选项来源路径（如 "state.nodes"）
}

// ============== 健康检查 ==============

// HealthCheckRequest 是健康检查请求。
message HealthCheckRequest {}

// HealthCheckResponse 表示健康检查结果。
message HealthCheckResponse {
  HealthStatus status = 1;
  string message = 2;
  int64 checked_at_ms = 3;
}
