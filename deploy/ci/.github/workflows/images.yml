name: images

on:
  push:
    branches: [main]
    paths: ['deploy/images/**']

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: detect
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- deploy/images/ | \
                    awk -F/ '{print $3"/"$4}' | sort -u | grep -v '^$')
          if [ -z "$CHANGED" ]; then
            echo "matrix={\"include\":[]}" >> $GITHUB_OUTPUT
            exit 0
          fi
          MATRIX=$(echo "$CHANGED" | jq -R -s -c 'split("\n")[:-1] | map(select(length > 0)) | map({path: .})')
          echo "matrix={\"include\":$MATRIX}" >> $GITHUB_OUTPUT

  build:
    needs: detect-changes
    if: fromJson(needs.detect-changes.outputs.matrix).include[0] != null
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: deploy/images/${{ matrix.path }}/Dockerfile
          failure-threshold: error
      - name: Validate manifest
        run: |
          MANIFEST=deploy/images/${{ matrix.path }}/manifest.yaml
          test -f "$MANIFEST" || (echo "ERROR: manifest.yaml missing" && exit 1)
          for FIELD in name category ecosystem description registry_project; do
            grep -q "^${FIELD}:" "$MANIFEST" || (echo "ERROR: missing field $FIELD" && exit 1)
          done
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: registry.lianjing.com
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - name: Parse manifest and build
        run: |
          MANIFEST=deploy/images/${{ matrix.path }}/manifest.yaml
          PROJECT=$(grep '^registry_project:' "$MANIFEST" | awk '{print $2}' | tr -d '"')
          NAME=$(grep '^name:' "$MANIFEST" | head -1 | awk '{print $2}' | tr -d '"')
          for TAG in $(grep '    tag:' "$MANIFEST" | awk '{print $2}' | tr -d '"'); do
            echo "==> Building ${PROJECT}/${NAME}:${TAG}"
            docker buildx build \
              --build-arg VERSION="${TAG}" \
              -t "registry.lianjing.com/${PROJECT}/${NAME}:${TAG}" \
              -t "registry.lianjing.com/${PROJECT}/${NAME}:sha-$(echo ${{ github.sha }} | cut -c1-8)" \
              --push \
              "deploy/images/${{ matrix.path }}"
          done
      - name: Trivy Scan
        run: |
          MANIFEST=deploy/images/${{ matrix.path }}/manifest.yaml
          PROJECT=$(grep '^registry_project:' "$MANIFEST" | awk '{print $2}' | tr -d '"')
          NAME=$(grep '^name:' "$MANIFEST" | head -1 | awk '{print $2}' | tr -d '"')
          TAG=$(grep '    tag:' "$MANIFEST" | head -1 | awk '{print $2}' | tr -d '"')
          ALLOW_CRITICAL=$(grep 'allow_critical:' "$MANIFEST" | awk '{print $2}')
          EXIT_CODE=1
          if [ "$ALLOW_CRITICAL" = "true" ]; then EXIT_CODE=0; fi
          docker run --rm aquasec/trivy image \
            --severity CRITICAL \
            --exit-code $EXIT_CODE \
            "registry.lianjing.com/${PROJECT}/${NAME}:${TAG}"
