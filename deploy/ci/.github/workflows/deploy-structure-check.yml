name: Deploy structure check

on:
  pull_request:
    paths:
      - 'deploy/**'

jobs:
  check-required-layout:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required directories
        run: |
          test -d deploy/docker
          test -d deploy/images/experiment
          test -d deploy/images/ctf
          test -d deploy/docker-compose
          test -d deploy/k8s/base
          test -d deploy/k8s/overlays/dev
          test -d deploy/k8s/overlays/staging
          test -d deploy/k8s/overlays/prod
          test -d deploy/ci

      - name: Verify platform Dockerfiles
        run: |
          test -f deploy/docker/backend.Dockerfile
          test -f deploy/docker/sim-engine.Dockerfile
          test -f deploy/docker/scenario.Dockerfile
          test -f deploy/docker/frontend.Dockerfile
          test -f deploy/docker/frontend-deployment.md

      - name: Verify image catalogs and runtime templates
        run: |
          test -f deploy/images/README.md
          test -f deploy/images/experiment/IMAGE_CATALOG.md
          test -f deploy/images/ctf/IMAGE_CATALOG.md
          test -f deploy/k8s/base/runtime-templates/README.md
          test -f deploy/k8s/base/runtime-templates/runtime-labels.md

      - name: Verify compose files
        run: |
          test -f deploy/docker-compose/docker-compose.dev.yml
          test -f deploy/docker-compose/docker-compose.prod.yml
