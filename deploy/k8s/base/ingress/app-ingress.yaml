# deploy/k8s/base/ingress/app-ingress.yaml
# 前端应用 Ingress
# 统一承接平台 Web 页面访问流量
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app
  namespace: lenschain
  labels:
    app.kubernetes.io/name: app-ingress
    app.kubernetes.io/part-of: lenschain
    app.kubernetes.io/managed-by: kustomize
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
spec:
  ingressClassName: nginx
  rules:
    - host: app.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
