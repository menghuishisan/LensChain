# deploy/k8s/base/ingress/files-ingress.yaml
# 文件访问 Ingress
# 对外暴露对象存储 API，支撑预签名上传和文件下载访问
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: files
  namespace: lenschain
  labels:
    app.kubernetes.io/name: files-ingress
    app.kubernetes.io/part-of: lenschain
    app.kubernetes.io/managed-by: kustomize
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "500m"
spec:
  ingressClassName: nginx
  rules:
    - host: files.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: minio
                port:
                  number: 9000
