# deploy/k8s/base/nats/service.yaml
# NATS Service
# 提供消息客户端访问入口和监控端口访问能力
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: lenschain
  labels:
    app.kubernetes.io/name: nats
    app.kubernetes.io/component: messaging
    app.kubernetes.io/part-of: lenschain
    app.kubernetes.io/managed-by: kustomize
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: nats
  ports:
    - port: 4222
      targetPort: 4222
      protocol: TCP
      name: client
    - port: 8222
      targetPort: 8222
      protocol: TCP
      name: monitoring
