# deploy/k8s/base/frontend/service.yaml
# 前端服务 ClusterIP Service
# 为 Ingress 和集群内部访问提供统一服务发现入口
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: lenschain
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: lenschain
    app.kubernetes.io/managed-by: kustomize
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: frontend
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
