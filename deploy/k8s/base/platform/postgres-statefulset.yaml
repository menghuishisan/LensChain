apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: lenschain-platform
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: lenschain
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/part-of: lenschain
    spec:
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: lenschain
            - name: POSTGRES_USER
              value: lenschain
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-infra-secret
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
