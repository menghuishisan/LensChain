apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sim-engine
  namespace: lenschain-platform
  labels:
    app.kubernetes.io/name: sim-engine
    app.kubernetes.io/part-of: lenschain
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sim-engine
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
