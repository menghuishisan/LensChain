apiVersion: v1
kind: ConfigMap
metadata:
  name: sim-engine-config
  namespace: lenschain-platform
  labels:
    app.kubernetes.io/name: sim-engine
    app.kubernetes.io/part-of: lenschain

data:
  SIM_ENGINE_HTTP_ADDR: ":8090"
  SIM_ENGINE_GRPC_ADDR: ":9090"
  SIM_ENGINE_PUBLIC_BASE: "wss://sim-engine.example.com"
  SIM_ENGINE_OBJECT_STORAGE_ENDPOINT: "minio:9000"
  SIM_ENGINE_OBJECT_STORAGE_BUCKET: "lenschain"
  SIM_ENGINE_OBJECT_STORAGE_REGION: "us-east-1"
  SIM_ENGINE_OBJECT_STORAGE_PREFIX: "sim-engine/snapshots"
  SIM_ENGINE_OBJECT_STORAGE_USE_SSL: "false"
  SIM_ENGINE_WS_JWT_ISSUER: "lenschain"
  SIM_ENGINE_WS_JWT_AUDIENCE: "lenschain-users"
  SIM_ENGINE_SCENE_ENDPOINTS: "pbft-consensus=pbft-consensus:8080,pow-mining=pow-mining:8080"
