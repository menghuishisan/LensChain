apiVersion: apps/v1
kind: Deployment
metadata:
  name: sim-engine
  namespace: lenschain-platform
  labels:
    app.kubernetes.io/name: sim-engine
    app.kubernetes.io/part-of: lenschain
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sim-engine
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sim-engine
        app.kubernetes.io/part-of: lenschain
    spec:
      containers:
        - name: sim-engine
          image: lenschain/sim-engine:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8090
              name: http
            - containerPort: 9090
              name: grpc
          envFrom:
            - configMapRef:
                name: sim-engine-config
            - secretRef:
                name: sim-engine-secret
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
