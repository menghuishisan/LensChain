apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: lenschain-platform
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: lenschain
type: Opaque
stringData:
  LENSCHAIN_DATABASE_USER: lenschain
  LENSCHAIN_DATABASE_PASSWORD: change-me
  LENSCHAIN_MINIO_ACCESS_KEY: minioadmin
  LENSCHAIN_MINIO_SECRET_KEY: change-me
  LENSCHAIN_JWT_ACCESS_SECRET: change-me
  LENSCHAIN_JWT_REFRESH_SECRET: change-me
