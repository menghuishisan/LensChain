apiVersion: batch/v1
kind: Job
metadata:
  name: minio-bootstrap
  namespace: lenschain-platform
  labels:
    app.kubernetes.io/name: minio-bootstrap
    app.kubernetes.io/part-of: lenschain
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio-bootstrap
        app.kubernetes.io/part-of: lenschain
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:RELEASE.2025-03-12T17-29-24Z
          command:
            - /bin/sh
            - -c
            - |
              until mc alias set local http://minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do sleep 2; done
              mc mb --ignore-existing local/lenschain
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: platform-infra-secret
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-infra-secret
                  key: MINIO_ROOT_PASSWORD
