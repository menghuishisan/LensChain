apiVersion: v1
kind: Service
metadata:
  name: sim-engine
  namespace: lenschain-platform
  labels:
    app.kubernetes.io/name: sim-engine
    app.kubernetes.io/part-of: lenschain
spec:
  selector:
    app.kubernetes.io/name: sim-engine
  ports:
    - name: http
      port: 8090
      targetPort: http
    - name: grpc
      port: 9090
      targetPort: grpc
