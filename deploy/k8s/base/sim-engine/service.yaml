# deploy/k8s/base/sim-engine/service.yaml
# SimEngine Core Service
# 为后端和前端提供 gRPC 与 WebSocket 访问入口
apiVersion: v1
kind: Service
metadata:
  name: sim-engine
  namespace: lenschain
  labels:
    app.kubernetes.io/name: sim-engine
    app.kubernetes.io/component: simulation
    app.kubernetes.io/part-of: lenschain
    app.kubernetes.io/managed-by: kustomize
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: sim-engine
  ports:
    - port: 50051
      targetPort: 50051
      protocol: TCP
      name: grpc
    - port: 50052
      targetPort: 50052
      protocol: TCP
      name: ws
