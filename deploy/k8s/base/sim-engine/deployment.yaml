# deploy/k8s/base/sim-engine/deployment.yaml
# SimEngine Core Deployment
# 提供仿真会话调度、状态同步和场景运行时协调能力
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sim-engine
  namespace: lenschain
  labels:
    app.kubernetes.io/name: sim-engine
    app.kubernetes.io/component: simulation
    app.kubernetes.io/part-of: lenschain
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: sim-engine
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sim-engine
        app.kubernetes.io/component: simulation
        app.kubernetes.io/part-of: lenschain
    spec:
      serviceAccountName: lenschain-sim-engine
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: sim-engine
          image: registry.lianjing.com/lenschain/sim-engine-core:v1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 50051
              name: grpc
            - containerPort: 50052
              name: ws
          env:
            - name: TZ
              value: UTC
            # SimEngine 监听地址（与 containerPort 对应）
            - name: SIM_ENGINE_HTTP_ADDR
              value: ":50052"
            - name: SIM_ENGINE_GRPC_ADDR
              value: ":50051"
            # 前端 WebSocket 连接的公开基地址（经 Ingress 暴露）
            - name: SIM_ENGINE_PUBLIC_BASE
              value: "wss://api.lianjing.com/ws/sim-engine"
            # WebSocket JWT 验证（与后端 JWT 配置保持一致）
            - name: SIM_ENGINE_WS_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: jwt-access-secret
            - name: SIM_ENGINE_WS_JWT_ISSUER
              value: "lenschain"
            - name: SIM_ENGINE_WS_JWT_AUDIENCE
              value: "sim-engine"
            # 场景算法容器端点映射（格式: scene_code=host:port,scene_code2=host:port2）
            # 根据实际部署的场景容器配置，overlay 按环境覆盖
            - name: SIM_ENGINE_SCENE_ENDPOINTS
              value: "blockchain-basic=scene-blockchain-basic:50053"
            # MinIO 对象存储（快照持久化）
            - name: SIM_ENGINE_OBJECT_STORAGE_ENDPOINT
              value: "minio.lenschain.svc.cluster.local:9000"
            - name: SIM_ENGINE_OBJECT_STORAGE_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: root-user
            - name: SIM_ENGINE_OBJECT_STORAGE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: root-password
            - name: SIM_ENGINE_OBJECT_STORAGE_USE_SSL
              value: "false"
            - name: SIM_ENGINE_OBJECT_STORAGE_BUCKET
              value: "lenschain"
            - name: SIM_ENGINE_OBJECT_STORAGE_REGION
              value: "us-east-1"
            - name: SIM_ENGINE_OBJECT_STORAGE_PREFIX
              value: "snapshots/"
            # 快照加密密钥（32 字节）；从 backend-secret 复用或单独管理
            - name: SIM_ENGINE_SNAPSHOT_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: snapshot-encryption-key
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 50052
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 50052
            initialDelaySeconds: 5
            periodSeconds: 10
      imagePullSecrets:
        - name: registry-pull-secret
