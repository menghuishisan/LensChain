# deploy/k8s/base/sim-engine/deployment.yaml
# SimEngine Core Deployment
# 提供仿真会话调度、状态同步和场景运行时协调能力
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sim-engine
  namespace: lenschain
  labels:
    app.kubernetes.io/name: sim-engine
    app.kubernetes.io/component: simulation
    app.kubernetes.io/part-of: lenschain
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: sim-engine
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sim-engine
        app.kubernetes.io/component: simulation
        app.kubernetes.io/part-of: lenschain
    spec:
      serviceAccountName: lenschain-sim-engine
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: sim-engine
          image: registry.lianjing.com/lenschain/sim-engine-core:v1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 50051
              name: grpc
            - containerPort: 50052
              name: ws
          env:
            - name: TZ
              value: UTC
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 50052
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 50052
            initialDelaySeconds: 5
            periodSeconds: 10
      imagePullSecrets:
        - name: registry-pull-secret
