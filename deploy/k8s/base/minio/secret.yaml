# deploy/k8s/base/minio/secret.yaml
# MinIO 占位 Secret
# 仅用于 base 层给出字段结构，真实值通过 create-secrets 脚本从 deploy/config.env 读取并创建
# 不要在本文件中填写真实密码
apiVersion: v1
kind: Secret
metadata:
  name: minio-secret
  namespace: lenschain
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/part-of: lenschain
    app.kubernetes.io/managed-by: kustomize
type: Opaque
stringData:
  root-user: CHANGE_ME
  root-password: CHANGE_ME
