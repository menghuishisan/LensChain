# deploy/k8s/base/minio/service.yaml
# MinIO Service
# 为对象存储 API 与 Console 提供集群内访问入口
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: lenschain
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/component: storage
    app.kubernetes.io/part-of: lenschain
    app.kubernetes.io/managed-by: kustomize
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: minio
  ports:
    - port: 9000
      targetPort: 9000
      protocol: TCP
      name: api
    - port: 9001
      targetPort: 9001
      protocol: TCP
      name: console
