apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: image-prepuller
  namespace: lenschain-system
  labels:
    app.kubernetes.io/name: image-prepuller
    app.kubernetes.io/component: ops
    app.kubernetes.io/part-of: lenschain
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: image-prepuller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: image-prepuller
        app.kubernetes.io/component: ops
        app.kubernetes.io/part-of: lenschain
    spec:
      serviceAccountName: lenschain-image-prepuller
      tolerations:
        - operator: Exists
      containers:
        - name: prepuller
          image: registry.lianjing.com/lenschain/image-prepuller:v1.0.0
          env:
            - name: TZ
              value: UTC
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: BACKEND_URL
              value: http://backend.lenschain.svc.cluster.local:8080
            - name: CONCURRENCY
              value: "3"
          volumeMounts:
            - name: image-manifest
              mountPath: /etc/image-manifest
              readOnly: true
            - name: crictl-sock
              mountPath: /var/run/containerd/containerd.sock
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: image-manifest
          configMap:
            name: image-manifest
        - name: crictl-sock
          hostPath:
            path: /var/run/containerd/containerd.sock
