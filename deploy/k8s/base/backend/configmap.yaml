# deploy/k8s/base/backend/configmap.yaml
# 后端服务基础配置
# 存放非敏感运行配置，供 backend Deployment 挂载读取
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: lenschain
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: lenschain
    app.kubernetes.io/managed-by: kustomize
data:
  config.yaml: |
    server:
      port: 8080
      mode: release
    database:
      host: postgres
      port: 5432
      user: lenschain
      dbname: lenschain
      sslmode: disable
      max_open_conns: 50
      max_idle_conns: 10
    redis:
      host: redis
      port: 6379
      db: 0
    minio:
      endpoint: minio:9000
      use_ssl: false
    nats:
      url: nats://nats:4222
    k8s:
      collector_image_template: "registry.lianjing.com/lenschain/collector-agent-%s:v1.0.0"
