# deploy/k8s/base/backend/secret.yaml
# 后端服务占位 Secret
# 仅用于 base 层给出字段结构，真实敏感值由 overlay 或密钥系统覆盖
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: lenschain
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: lenschain
    app.kubernetes.io/managed-by: kustomize
type: Opaque
stringData:
  database-password: CHANGE_ME
  jwt-access-secret: CHANGE_ME
  jwt-refresh-secret: CHANGE_ME
