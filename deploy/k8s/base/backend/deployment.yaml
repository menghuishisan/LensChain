# deploy/k8s/base/backend/deployment.yaml
# 后端服务 Deployment
# 提供平台 REST API、WebSocket 能力和动态实验/竞赛运行时入口
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: lenschain
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: lenschain
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: lenschain
    spec:
      serviceAccountName: lenschain-backend
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: backend
          image: registry.lianjing.com/lenschain/backend:v1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: TZ
              value: UTC
            - name: LENSCHAIN_DATABASE_HOST
              value: postgres
            - name: LENSCHAIN_DATABASE_PORT
              value: "5432"
            - name: LENSCHAIN_DATABASE_USER
              value: lenschain
            - name: LENSCHAIN_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: database-password
            - name: LENSCHAIN_REDIS_HOST
              value: redis
            - name: LENSCHAIN_REDIS_PORT
              value: "6379"
            - name: LENSCHAIN_JWT_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: jwt-access-secret
            - name: LENSCHAIN_JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: jwt-refresh-secret
          volumeMounts:
            - name: config
              mountPath: /app/configs
              readOnly: true
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /startupz
              port: 8080
            failureThreshold: 30
            periodSeconds: 2
      volumes:
        - name: config
          configMap:
            name: backend-config
      imagePullSecrets:
        - name: registry-pull-secret
