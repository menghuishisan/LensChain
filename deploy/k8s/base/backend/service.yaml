# deploy/k8s/base/backend/service.yaml
# 后端服务 ClusterIP Service
# 为前端、平台内部服务和运维探针提供统一访问入口
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: lenschain
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: lenschain
    app.kubernetes.io/managed-by: kustomize
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: backend
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
