# deploy/k8s/base/cronjobs/pv-cleanup.yaml
# 实验卷清理 CronJob
# 对已结束实例的遗留存储执行延迟清理，避免立即删除影响取证与回查
apiVersion: batch/v1
kind: CronJob
metadata:
  name: pv-cleanup
  namespace: lenschain-system
  labels:
    app.kubernetes.io/name: pv-cleanup
    app.kubernetes.io/component: ops
    app.kubernetes.io/part-of: lenschain
    app.kubernetes.io/managed-by: kustomize
spec:
  schedule: "0 */6 * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: lenschain-backup
          containers:
            - name: cleanup
              image: registry.lianjing.com/lenschain/pv-cleanup:v1.0.0
              env:
                - name: TZ
                  value: UTC
                - name: RETENTION_HOURS
                  value: "24"
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 256Mi
          restartPolicy: OnFailure
