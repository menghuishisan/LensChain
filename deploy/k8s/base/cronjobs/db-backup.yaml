# deploy/k8s/base/cronjobs/db-backup.yaml
# 数据库备份 CronJob
# 定时执行数据库备份，pg_dump 后通过 mc 上传到 MinIO 对象存储
# 备份文件路径：s3://lenschain-backup/db/{date}.sql.gz
apiVersion: batch/v1
kind: CronJob
metadata:
  name: db-backup
  namespace: lenschain-system
  labels:
    app.kubernetes.io/name: db-backup
    app.kubernetes.io/component: ops
    app.kubernetes.io/part-of: lenschain
    app.kubernetes.io/managed-by: kustomize
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: lenschain-backup
          containers:
            - name: backup
              image: registry.lianjing.com/middleware/postgres:15
              command:
                - /bin/bash
                - -c
                - |
                  set -euo pipefail
                  BACKUP_FILE="/tmp/lenschain-$(date +%F-%H%M%S).sql.gz"
                  echo "[backup] starting pg_dump ..."
                  pg_dump -h postgres.lenschain.svc.cluster.local \
                          -U lenschain lenschain \
                          | gzip > "${BACKUP_FILE}"
                  echo "[backup] pg_dump done, uploading to MinIO ..."
                  # 安装 mc（MinIO Client）
                  curl -fsSL https://dl.min.io/client/mc/release/linux-amd64/mc -o /usr/local/bin/mc
                  chmod +x /usr/local/bin/mc
                  mc alias set backup "${MINIO_ENDPOINT}" "${MINIO_ACCESS_KEY}" "${MINIO_SECRET_KEY}"
                  mc mb --ignore-existing backup/lenschain-backup
                  mc cp "${BACKUP_FILE}" "backup/lenschain-backup/db/$(basename ${BACKUP_FILE})"
                  echo "[backup] upload complete: $(basename ${BACKUP_FILE})"
                  # 清理超过保留天数的旧备份
                  mc rm --older-than "${RETENTION_DAYS}d" --recursive --force backup/lenschain-backup/db/ || true
                  rm -f "${BACKUP_FILE}"
                  echo "[backup] cleanup done"
              env:
                - name: TZ
                  value: UTC
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secret
                      key: password
                - name: MINIO_ENDPOINT
                  value: "http://minio.lenschain.svc.cluster.local:9000"
                - name: MINIO_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: minio-secret
                      key: root-user
                - name: MINIO_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: minio-secret
                      key: root-password
                - name: RETENTION_DAYS
                  value: "30"
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 1Gi
          imagePullSecrets:
            - name: registry-pull-secret
          restartPolicy: OnFailure
