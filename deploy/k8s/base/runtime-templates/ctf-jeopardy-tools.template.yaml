apiVersion: apps/v1
kind: Deployment
metadata:
  name: contestant-tools
  namespace: ${NAMESPACE}
  labels:
    lenschain.io/runtime-type: ctf-jeopardy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: contestant-tools
  template:
    metadata:
      labels:
        app.kubernetes.io/name: contestant-tools
        lenschain.io/runtime-type: ctf-jeopardy
    spec:
      containers:
        - name: contestant-tools
          image: ${TOOLS_IMAGE}
          imagePullPolicy: IfNotPresent
