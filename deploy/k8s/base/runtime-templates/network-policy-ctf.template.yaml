apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ctf-runtime-policy
  namespace: ${NAMESPACE}
  labels:
    lenschain.io/runtime-type: ctf
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}
    - to:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/name: lenschain-platform
      ports:
        - protocol: TCP
          port: 4222
        - protocol: TCP
          port: 9000
