# deploy/k8s/base/redis/service.yaml
# Redis Service
# 为平台缓存、会话和轻量消息能力提供统一访问入口
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: lenschain
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: lenschain
    app.kubernetes.io/managed-by: kustomize
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: redis
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
      name: redis
