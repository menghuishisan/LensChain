apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: lenschain
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: lenschain
    app.kubernetes.io/managed-by: kustomize
spec:
  serviceName: redis-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/component: cache
        app.kubernetes.io/part-of: lenschain
    spec:
      containers:
        - name: redis
          image: registry.lianjing.com/middleware/redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis
          env:
            - name: TZ
              value: UTC
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: lenschain-ssd
        resources:
          requests:
            storage: 10Gi
