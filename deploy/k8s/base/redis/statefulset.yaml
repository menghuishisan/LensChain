# deploy/k8s/base/redis/statefulset.yaml
# Redis StatefulSet
# 承载平台缓存和会话数据，提供基础持久化能力
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: lenschain
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: lenschain
    app.kubernetes.io/managed-by: kustomize
spec:
  serviceName: redis-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/component: cache
        app.kubernetes.io/part-of: lenschain
    spec:
      containers:
        - name: redis
          image: registry.lianjing.com/middleware/redis:7-alpine
          command: ["redis-server", "--requirepass", "$(REDIS_PASSWORD)", "--appendonly", "yes"]
          ports:
            - containerPort: 6379
              name: redis
          env:
            - name: TZ
              value: UTC
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: password
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command: ["sh", "-c", "redis-cli -a ${REDIS_PASSWORD} ping | grep -q PONG"]
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["sh", "-c", "redis-cli -a ${REDIS_PASSWORD} ping | grep -q PONG"]
            initialDelaySeconds: 5
            periodSeconds: 5
      imagePullSecrets:
        - name: registry-pull-secret
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: lenschain-ssd
        resources:
          requests:
            storage: 10Gi
