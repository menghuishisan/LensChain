# deploy/k8s/base/rbac/sim-engine-clusterrole.yaml
# SimEngine 运行时权限
# 为仿真引擎动态管理场景运行资源提供最小必要权限
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: lenschain-sim-engine-operator
  labels:
    app.kubernetes.io/name: sim-engine-operator
    app.kubernetes.io/part-of: lenschain
    app.kubernetes.io/managed-by: kustomize
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: lenschain-sim-engine-operator
  labels:
    app.kubernetes.io/name: sim-engine
    app.kubernetes.io/part-of: lenschain
    app.kubernetes.io/managed-by: kustomize
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: lenschain-sim-engine-operator
subjects:
  - kind: ServiceAccount
    name: lenschain-sim-engine
    namespace: lenschain
