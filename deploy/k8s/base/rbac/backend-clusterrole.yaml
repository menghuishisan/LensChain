# deploy/k8s/base/rbac/backend-clusterrole.yaml
# 后端运行时编排权限
# 允许后端动态创建实验与竞赛所需的 Namespace、Pod、Service、PVC 和网络策略
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: lenschain-experiment-operator
  labels:
    app.kubernetes.io/name: experiment-operator
    app.kubernetes.io/part-of: lenschain
    app.kubernetes.io/managed-by: kustomize
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["create", "get", "list", "watch", "delete", "patch"]
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "secrets", "persistentvolumeclaims", "events"]
    verbs: ["*"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets"]
    verbs: ["*"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies", "ingresses"]
    verbs: ["*"]
  - apiGroups: [""]
    resources: ["pods/exec", "pods/log", "pods/portforward"]
    verbs: ["create", "get"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
