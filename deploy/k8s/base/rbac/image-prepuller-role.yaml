# deploy/k8s/base/rbac/image-prepuller-role.yaml
# 预拉取组件权限定义
# 允许 image-prepuller 读取镜像清单 ConfigMap，并在集群中以受控身份运行
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: lenschain-image-prepuller-role
  labels:
    app.kubernetes.io/name: image-prepuller
    app.kubernetes.io/part-of: lenschain
    app.kubernetes.io/managed-by: kustomize
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "watch"]
    resourceNames: ["image-manifest"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: lenschain-image-prepuller
  labels:
    app.kubernetes.io/name: image-prepuller
    app.kubernetes.io/part-of: lenschain
    app.kubernetes.io/managed-by: kustomize
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: lenschain-image-prepuller-role
subjects:
  - kind: ServiceAccount
    name: lenschain-image-prepuller
    namespace: lenschain-system
