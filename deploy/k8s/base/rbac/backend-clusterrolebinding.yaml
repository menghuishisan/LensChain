# deploy/k8s/base/rbac/backend-clusterrolebinding.yaml
# 后端编排权限绑定
# 将动态实验/竞赛运行时所需的 ClusterRole 绑定给 lenschain-backend ServiceAccount
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: lenschain-backend-experiment-operator
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: lenschain
    app.kubernetes.io/managed-by: kustomize
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: lenschain-experiment-operator
subjects:
  - kind: ServiceAccount
    name: lenschain-backend
    namespace: lenschain
