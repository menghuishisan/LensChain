# deploy/k8s/base/rbac/backend-serviceaccount.yaml
# 平台核心 ServiceAccount 定义
# 为 backend、sim-engine、image-prepuller 和 backup 任务提供身份主体
apiVersion: v1
kind: ServiceAccount
metadata:
  name: lenschain-backend
  namespace: lenschain
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: lenschain
    app.kubernetes.io/managed-by: kustomize
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: lenschain-sim-engine
  namespace: lenschain
  labels:
    app.kubernetes.io/name: sim-engine
    app.kubernetes.io/part-of: lenschain
    app.kubernetes.io/managed-by: kustomize
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: lenschain-image-prepuller
  namespace: lenschain-system
  labels:
    app.kubernetes.io/name: image-prepuller
    app.kubernetes.io/part-of: lenschain
    app.kubernetes.io/managed-by: kustomize
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: lenschain-backup
  namespace: lenschain-system
  labels:
    app.kubernetes.io/name: backup
    app.kubernetes.io/part-of: lenschain
    app.kubernetes.io/managed-by: kustomize
