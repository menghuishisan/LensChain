# deploy/k8s/base/postgres/service.yaml
# PostgreSQL Service
# 提供数据库访问入口及 StatefulSet 所需的服务发现能力
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: lenschain
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: lenschain
    app.kubernetes.io/managed-by: kustomize
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-headless
  namespace: lenschain
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: lenschain
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
