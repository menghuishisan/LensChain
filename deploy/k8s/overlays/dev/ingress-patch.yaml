# deploy/k8s/overlays/dev/ingress-patch.yaml
# 开发环境 Ingress 补丁
# 关闭 TLS 并使用本地开发域名，便于本地调试访问
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app
  namespace: lenschain
spec:
  rules:
    - host: app.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api
  namespace: lenschain
spec:
  rules:
    - host: api.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
