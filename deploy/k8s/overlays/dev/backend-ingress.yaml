apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backend
  namespace: lenschain-platform
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: lenschain
spec:
  rules:
    - host: api-dev.lenschain.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 3000
