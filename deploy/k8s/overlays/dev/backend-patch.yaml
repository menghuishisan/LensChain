# deploy/k8s/overlays/dev/backend-patch.yaml
# 开发环境后端补丁
# 覆盖 backend 副本数和资源配置，使其适合本地或轻量集群调试
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: lenschain
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: backend
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
