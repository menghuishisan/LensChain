# deploy/k8s/overlays/prod/backend-patch.yaml
# 生产环境后端补丁
# 提升副本数和资源规格，满足正式环境的高可用与并发要求
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: lenschain
spec:
  replicas: 3
  template:
    spec:
      containers:
        - name: backend
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
