apiVersion: apps/v1
kind: Deployment
metadata:
  name: sim-engine
  namespace: lenschain
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: sim-engine
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
