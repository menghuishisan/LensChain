# deploy/k8s/overlays/prod/frontend-patch.yaml
# 生产环境前端补丁
# 调整 frontend 副本数和资源规格，满足正式访问流量需求
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: lenschain
spec:
  replicas: 3
  template:
    spec:
      containers:
        - name: frontend
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
