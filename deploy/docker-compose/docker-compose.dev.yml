# docker-compose.dev.yml
# 链镜平台本地开发环境
# 用途：启动中间件依赖（PG/Redis/MinIO/NATS），后端和前端由开发者本地进程运行
# 说明：宿主机端口为避免与其他项目冲突统一偏移 +10；容器内标准端口保持不变
# 使用：docker compose --env-file deploy/config.env -f deploy/docker-compose/docker-compose.dev.yml up -d
# 完整模式（含 SimEngine）：docker compose --env-file deploy/config.env -f deploy/docker-compose/docker-compose.dev.yml --profile full up -d
# 清理：docker compose -f deploy/docker-compose/docker-compose.dev.yml down -v && rm -rf deploy/docker-compose/data/
# 重要：必须通过 --env-file 传入 config.env，密码不使用弱默认值

services:
  postgres:
    image: postgres:15
    container_name: lenschain-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-lenschain}
      POSTGRES_USER: ${DB_USER:-lenschain}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-__CHANGE_ME__}
      TZ: UTC
    ports:
      - "5442:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lenschain"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  redis:
    image: redis:7-alpine
    container_name: lenschain-redis
    restart: unless-stopped
    environment:
      TZ: UTC
    ports:
      - "6389:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: lenschain-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-__CHANGE_ME__}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-__CHANGE_ME__}
      TZ: UTC
    ports:
      - "9010:9000"
      - "9011:9001"
    volumes:
      - ./data/minio:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    container_name: lenschain-nats
    restart: unless-stopped
    environment:
      TZ: UTC
    ports:
      - "4232:4222"
      - "8232:8222"
    command: ["-js", "-m", "8222"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  sim-engine:
    image: registry.lianjing.com/lenschain/sim-engine-core:dev
    container_name: lenschain-sim-engine
    restart: unless-stopped
    profiles: ["full"]
    environment:
      TZ: UTC
    ports:
      - "50061:50051"
      - "50062:50052"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

networks:
  default:
    name: lenschain-dev
