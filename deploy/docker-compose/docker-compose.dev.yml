# docker-compose.dev.yml
# 链镜平台本地开发环境
# 用途：启动中间件依赖（PG/Redis/MinIO/NATS），后端和前端由开发者本地进程运行
# 使用：docker compose -f deploy/docker-compose/docker-compose.dev.yml up -d
# 完整模式（含 SimEngine）：docker compose -f deploy/docker-compose/docker-compose.dev.yml --profile full up -d
# 清理：docker compose -f deploy/docker-compose/docker-compose.dev.yml down -v && rm -rf deploy/docker-compose/data/

services:
  postgres:
    image: postgres:15
    container_name: lenschain-postgres
    environment:
      POSTGRES_DB: lenschain
      POSTGRES_USER: lenschain
      POSTGRES_PASSWORD: lenschain
      TZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lenschain"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  redis:
    image: redis:7-alpine
    container_name: lenschain-redis
    environment:
      TZ: UTC
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: lenschain-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      TZ: UTC
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/minio:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    container_name: lenschain-nats
    environment:
      TZ: UTC
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["-js", "-m", "8222"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  sim-engine:
    image: registry.lianjing.com/lenschain/sim-engine-core:dev
    container_name: lenschain-sim-engine
    profiles: ["full"]
    environment:
      TZ: UTC
    ports:
      - "50051:50051"
      - "50052:50052"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

networks:
  default:
    name: lenschain-dev
