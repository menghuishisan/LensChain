name: mysql
category: middleware
ecosystem: general
description: MySQL 关系型数据库
maintainer: lenschain-platform
license: GPL-2.0
official_source: mysql/mysql-server
registry_project: middleware

versions:
  - version: "8.0"
    tag: "v8.0"
    upstream_tag: "8.0"
    min_cpu: "0.25"
    min_memory: "256Mi"
    recommended_cpu: "0.5"
    recommended_memory: "512Mi"
    is_default: true

default_ports:
  - port: 3306
    protocol: tcp
    name: MySQL
    description: MySQL 服务端口

default_env_vars: []
conditional_env_vars: []

default_volumes:
  - mount_path: /var/lib/mysql
    purpose: db_data
    size: 10Gi
    description: 数据持久化

typical_companions:
  required: []
  recommended: []
  optional: []

required_dependencies: []
supported_tools: []

healthcheck:
  test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
  interval: 30s
  timeout: 5s
  retries: 3
  start_period: 30s

documentation_url: /docs/images/mysql
prepull_phase: 1
prepull_node_tier: light

security_scan:
  enabled: true
  allow_critical: false
  allow_high: true
