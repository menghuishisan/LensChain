# image.yaml
name: ctf-misc
module: ctf
category: base
runtime: ctf-misc
default_ports: []
ports: []
default_env_vars:
  - key: CHALLENGE_TYPE
    value: misc
    desc: 默认杂项题型标识
required_dependencies: []
typical_companions:
  required: []
  recommended:
    - image: ctf-tools
      reason: 提供通用网络与脚本辅助工具
  optional: []
resource_recommendation:
  cpu: 0.5
  memory: 512Mi
default_volumes:
  - path: /workspace
    desc: 题目脚本与附件目录
description: 杂项题目基础镜像，内置常见脚本与系统工具。
