# image.yaml
name: ctf-reverse
module: ctf
category: base
runtime: ctf-reverse
default_ports: []
ports: []
default_env_vars:
  - key: CHALLENGE_TYPE
    value: reverse
    desc: 默认逆向题型标识
required_dependencies: []
typical_companions:
  required: []
  recommended:
    - image: reverse-tools
      reason: 提供选手逆向分析工具
    - image: ctf-tools
      reason: 提供通用脚本与网络辅助工具
  optional: []
resource_recommendation:
  cpu: 0.5
  memory: 1Gi
default_volumes:
  - path: /workspace
    desc: 题目二进制与脚本目录
description: 逆向题目基础镜像，内置常见二进制分析工具。
