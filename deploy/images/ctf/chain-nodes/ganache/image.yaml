# image.yaml
# CTF 竞赛 — Ganache 链环境镜像元数据

name: ganache
module: ctf
category: chain-nodes
runtime: evm
default_ports:
  - port: 8545
    protocol: tcp
    name: RPC
ports:
  - 8545/tcp
default_env_vars:
  - key: CHAIN_ID
    value: "31337"
    desc: CTF 独立链默认链 ID
  - key: TOTAL_ACCOUNTS
    value: "20"
    desc: 预置账户数量
required_dependencies: []
typical_companions:
  required: []
  recommended:
    - image: foundry
      reason: 用于漏洞利用 PoC 与断言验证
    - image: blockchain-tools
      reason: 选手提交攻击交易与调试链上状态
  optional:
    - image: ctf-tools
      reason: 提供综合网络与脚本辅助工具
resource_recommendation:
  cpu: 0.25
  memory: 512Mi
  disk: 1Gi
default_volumes: []
description: 适用于智能合约安全题目、预验证与链上攻击环境的独立开发链镜像。
