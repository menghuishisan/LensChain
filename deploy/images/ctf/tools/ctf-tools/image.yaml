# image.yaml
# CTF 竞赛 — 通用工具镜像元数据

name: ctf-tools
module: ctf
category: tools
runtime: ctf-tools
default_ports: []
ports: []
default_env_vars: []
required_dependencies: []
typical_companions:
  required: []
  recommended:
    - image: web-target
      reason: Web 题目基础联调与利用
    - image: ganache
      reason: 智能合约题目链上辅助操作
  optional:
