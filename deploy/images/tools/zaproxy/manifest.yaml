name: zaproxy
category: tools
ecosystem: general
description: OWASP ZAP Web 安全测试代理
maintainer: lenschain-platform
license: Apache-2.0
official_source: zaproxy/zaproxy
registry_project: tools

versions:
  - version: "2.15"
    tag: "v2.15.0"
    upstream_tag: "2.15.0"
    min_cpu: "0.25"
    min_memory: "512Mi"
    recommended_cpu: "0.5"
    recommended_memory: "1Gi"
    is_default: true

default_ports:
  - port: 8080
    protocol: tcp
    name: Proxy
    description: ZAP 代理端口

default_env_vars: []
conditional_env_vars: []
default_volumes: []

typical_companions:
  required: []
  recommended: []
  optional: []

required_dependencies: []
supported_tools: []

healthcheck:
  test: ["CMD", "curl", "-fsS", "http://localhost:8080/"]
  interval: 60s
  timeout: 5s
  retries: 3
  start_period: 60s

documentation_url: /docs/images/zaproxy
prepull_phase: 1
prepull_node_tier: light

security_scan:
  enabled: true
  allow_critical: false
  allow_high: true
