name: ghidra-server
category: tools
ecosystem: general
description: Ghidra 逆向工程 Web 服务
maintainer: lenschain-platform
license: Apache-2.0
official_source: NationalSecurityAgency/ghidra
registry_project: tools

versions:
  - version: "11.0"
    tag: "v11.0.3"
    upstream_tag: "11.0.3"
    min_cpu: "0.5"
    min_memory: "1Gi"
    recommended_cpu: "1"
    recommended_memory: "2Gi"
    is_default: true

default_ports:
  - port: 18080
    protocol: tcp
    name: HTTP
    description: Ghidra Server 端口

default_env_vars: []
conditional_env_vars: []
default_volumes: []

typical_companions:
  required: []
  recommended: []
  optional: []

required_dependencies: []
supported_tools: []

healthcheck:
  test: ["CMD", "true"]
  interval: 60s
  timeout: 5s
  retries: 1
  start_period: 60s

documentation_url: /docs/images/ghidra-server
prepull_phase: 1
prepull_node_tier: heavy

security_scan:
  enabled: true
  allow_critical: false
  allow_high: true
