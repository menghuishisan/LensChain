name: sagemath
category: tools
ecosystem: general
description: SageMath 数学计算环境
maintainer: lenschain-platform
license: GPL-3.0
official_source: sagemath/sage
registry_project: tools

versions:
  - version: "10.3"
    tag: "v10.3"
    upstream_tag: "10.3"
    min_cpu: "0.25"
    min_memory: "512Mi"
    recommended_cpu: "0.5"
    recommended_memory: "1Gi"
    is_default: true

default_ports:
  - port: 8888
    protocol: tcp
    name: Jupyter
    description: Jupyter Notebook 端口

default_env_vars: []
conditional_env_vars: []
default_volumes: []

typical_companions:
  required: []
  recommended: []
  optional: []

required_dependencies: []
supported_tools: []

healthcheck:
  test: ["CMD", "sage", "--version"]
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 30s

documentation_url: /docs/images/sagemath
prepull_phase: 1
prepull_node_tier: light

security_scan:
  enabled: true
  allow_critical: false
  allow_high: true
