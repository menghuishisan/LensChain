name: jupyter-notebook
display_name: Jupyter Notebook
tool_kind: ide
category: tools
ecosystem: general
description: Jupyter Notebook 交互式编程环境
maintainer: lenschain-platform
license: BSD-3-Clause
official_source: jupyter/docker-stacks
registry_project: tools

versions:
  - version: "3.11"
    tag: "python-3.11"
    upstream_tag: "python-3.11"
    min_cpu: "0.25"
    min_memory: "512Mi"
    recommended_cpu: "0.5"
    recommended_memory: "1Gi"
    is_default: true

default_ports:
  - port: 8888
    protocol: tcp
    name: HTTP
    description: Jupyter Web 访问端口

default_env_vars: []
# jupyter-notebook 镜像 CMD 已显式 `--ServerApp.token= --ServerApp.password=`（详见
# Dockerfile 覆写），平台层 tool_proxy_cookie 是唯一鉴权点，因此本镜像不再读取
# JUPYTER_TOKEN / JUPYTER_PASSWORD。

conditional_env_vars: []

default_volumes:
  - mount_path: /home/jovyan/work
    purpose: project_data
    size: 5Gi
    description: 工作目录

typical_companions:
  required: []
  recommended: []
  optional: []

required_dependencies: []
supported_tools: []

healthcheck:
  test: ["CMD-SHELL", "curl -fsS http://localhost:8888/api"]
  interval: 30s
  timeout: 5s
  retries: 3
  start_period: 20s

documentation_url: /docs/images/jupyter-notebook
prepull_phase: 1
prepull_node_tier: light

security_scan:
  enabled: true
  allow_critical: false
  allow_high: true
