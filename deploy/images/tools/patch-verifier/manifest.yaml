name: patch-verifier
category: tools
ecosystem: ethereum
description: CTF 攻防赛补丁验证服务（平台自研）
maintainer: lenschain-platform
license: Proprietary
official_source: lenschain/patch-verifier
registry_project: tools

versions:
  - version: "1.0"
    tag: "v1.0.0"
    upstream_tag: "v1.0.0"
    min_cpu: "0.25"
    min_memory: "256Mi"
    recommended_cpu: "0.5"
    recommended_memory: "512Mi"
    is_default: true

default_ports:
  - port: 8091
    protocol: tcp
    name: HTTP
    description: 补丁验证服务 API 端口

default_env_vars: []
conditional_env_vars: []
default_volumes: []

typical_companions:
  required:
    - image: judge-service
      reason: 裁判结算服务
  recommended: []
  optional: []

required_dependencies:
  - judge-service

supported_tools: []

healthcheck:
  test: ["CMD-SHELL", "curl -fsS http://localhost:8091/healthz"]
  interval: 30s
  timeout: 5s
  retries: 3
  start_period: 15s

documentation_url: /docs/images/patch-verifier
prepull_phase: 1
prepull_node_tier: light

security_scan:
  enabled: true
  allow_critical: false
  allow_high: true
