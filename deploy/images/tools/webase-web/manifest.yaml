name: webase-web
category: tools
ecosystem: fisco
description: WeBase Web 管理平台
maintainer: lenschain-platform
license: Apache-2.0
official_source: WeBankBlockchain/WeBASE-Web
registry_project: tools

versions:
  - version: "3.1"
    tag: "v3.1.1"
    upstream_tag: "v3.1.1"
    min_cpu: "0.25"
    min_memory: "256Mi"
    recommended_cpu: "0.5"
    recommended_memory: "512Mi"
    is_default: true

default_ports:
  - port: 5000
    protocol: tcp
    name: HTTP
    description: WeBase Web 访问端口

default_env_vars: []
conditional_env_vars: []
default_volumes: []

typical_companions:
  required:
    - image: webase-front
      reason: 需要 WeBase Front 后端服务
  recommended: []
  optional: []

required_dependencies:
  - webase-front

supported_tools: []

healthcheck:
  test: ["CMD-SHELL", "curl -fsS http://localhost:5000/"]
  interval: 30s
  timeout: 5s
  retries: 3
  start_period: 20s

documentation_url: /docs/images/webase-web
prepull_phase: 1
prepull_node_tier: light

security_scan:
  enabled: true
  allow_critical: false
  allow_high: true
