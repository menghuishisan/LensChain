name: burpsuite-ce
category: tools
ecosystem: general
description: Burp Suite Community Edition Web 安全测试工具
maintainer: lenschain-platform
license: Proprietary
official_source: portswigger/burpsuite
registry_project: tools

versions:
  - version: "1.0"
    tag: "v1.0.0"
    upstream_tag: "v1.0.0"
    min_cpu: "0.25"
    min_memory: "512Mi"
    recommended_cpu: "0.5"
    recommended_memory: "1Gi"
    is_default: true

default_ports:
  - port: 8080
    protocol: tcp
    name: Proxy
    description: 代理端口

default_env_vars: []
conditional_env_vars: []
default_volumes: []

typical_companions:
  required: []
  recommended: []
  optional: []

required_dependencies: []
supported_tools: []

healthcheck:
  test: ["CMD", "true"]
  interval: 60s
  timeout: 5s
  retries: 1
  start_period: 30s

documentation_url: /docs/images/burpsuite-ce
prepull_phase: 1
prepull_node_tier: light

security_scan:
  enabled: true
  allow_critical: true
  allow_high: true
