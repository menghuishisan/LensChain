name: webase-front
category: tools
ecosystem: fisco
description: WeBase 前端节点管理
maintainer: lenschain-platform
license: Apache-2.0
official_source: WeBankBlockchain/WeBASE-Front
registry_project: tools

versions:
  - version: "1.5"
    tag: "v1.5.5"
    upstream_tag: "v1.5.5"
    min_cpu: "0.25"
    min_memory: "256Mi"
    recommended_cpu: "0.5"
    recommended_memory: "512Mi"
    is_default: true

default_ports:
  - port: 5002
    protocol: tcp
    name: HTTP
    description: WeBase Front 访问端口

default_env_vars: []
conditional_env_vars: []
default_volumes: []

typical_companions:
  required:
    - image: fisco-bcos
      reason: 需要连接 FISCO BCOS 节点
  recommended: []
  optional: []

required_dependencies:
  - fisco-bcos

supported_tools: []

healthcheck:
  test: ["CMD-SHELL", "curl -fsS http://localhost:5002/"]
  interval: 30s
  timeout: 5s
  retries: 3
  start_period: 30s

documentation_url: /docs/images/webase-front
prepull_phase: 1
prepull_node_tier: light

security_scan:
  enabled: true
  allow_critical: false
  allow_high: true
