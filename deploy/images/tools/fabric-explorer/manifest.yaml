name: fabric-explorer
category: tools
ecosystem: fabric
description: Hyperledger Explorer Fabric 区块链浏览器
maintainer: lenschain-platform
license: Apache-2.0
official_source: hyperledger-labs/blockchain-explorer
registry_project: tools

versions:
  - version: "1.1"
    tag: "v1.1.8"
    upstream_tag: "1.1.8"
    min_cpu: "0.25"
    min_memory: "256Mi"
    recommended_cpu: "0.5"
    recommended_memory: "512Mi"
    is_default: true

default_ports:
  - port: 8080
    protocol: tcp
    name: HTTP
    description: Explorer Web 访问端口

default_env_vars: []
conditional_env_vars: []
default_volumes: []

typical_companions:
  required:
    - image: fabric-peer
      reason: 需要连接 Fabric Peer 节点
    - image: postgres
      reason: 数据存储
  recommended: []
  optional: []

required_dependencies:
  - fabric-peer
  - postgres

supported_tools: []

healthcheck:
  test: ["CMD-SHELL", "curl -fsS http://localhost:8080/"]
  interval: 30s
  timeout: 5s
  retries: 3
  start_period: 30s

documentation_url: /docs/images/fabric-explorer
prepull_phase: 1
prepull_node_tier: light

security_scan:
  enabled: true
  allow_critical: false
  allow_high: true
