name: code-server
category: tools
ecosystem: general
description: VS Code Web 在线编辑器
maintainer: lenschain-platform
license: MIT
official_source: coder/code-server
registry_project: tools

versions:
  - version: "4.89"
    tag: "v4.89.1"
    upstream_tag: "4.89.1"
    min_cpu: "0.25"
    min_memory: "256Mi"
    recommended_cpu: "0.5"
    recommended_memory: "512Mi"
    is_default: true

default_ports:
  - port: 8080
    protocol: tcp
    name: HTTP
    description: Web IDE 访问端口

default_env_vars:
  - key: PASSWORD
    default_value: ""
    description: 访问密码（空则免密）
    required: false

conditional_env_vars: []

default_volumes:
  - mount_path: /home/coder/project
    purpose: project_data
    size: 5Gi
    description: 项目工作目录

typical_companions:
  required: []
  recommended: []
  optional: []

required_dependencies: []
supported_tools: []

healthcheck:
  test: ["CMD-SHELL", "curl -fsS http://localhost:8080/healthz"]
  interval: 30s
  timeout: 5s
  retries: 3
  start_period: 15s

documentation_url: /docs/images/code-server
prepull_phase: 1
prepull_node_tier: light

security_scan:
  enabled: true
  allow_critical: false
  allow_high: true
