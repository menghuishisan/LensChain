name: remix-ide
category: tools
ecosystem: ethereum
description: Remix IDE Solidity 在线开发环境
maintainer: lenschain-platform
license: MIT
official_source: ethereum/remix-project
registry_project: tools

versions:
  - version: "0.35"
    tag: "v0.35.0"
    upstream_tag: "v0.35.0"
    min_cpu: "0.25"
    min_memory: "256Mi"
    recommended_cpu: "0.5"
    recommended_memory: "512Mi"
    is_default: true

default_ports:
  - port: 8080
    protocol: tcp
    name: HTTP
    description: Remix IDE Web 访问端口

default_env_vars: []
conditional_env_vars: []
default_volumes: []

typical_companions:
  required: []
  recommended:
    - image: geth
      reason: 本地以太坊节点
    - image: ganache
      reason: 轻量级 EVM 模拟器
  optional: []

required_dependencies: []

supported_tools:
  - geth
  - ganache
  - hardhat-node

healthcheck:
  test: ["CMD-SHELL", "wget -qO- http://localhost:8080"]
  interval: 30s
  timeout: 5s
  retries: 3
  start_period: 15s

documentation_url: /docs/images/remix-ide
prepull_phase: 1
prepull_node_tier: light

security_scan:
  enabled: true
  allow_critical: false
  allow_high: true
