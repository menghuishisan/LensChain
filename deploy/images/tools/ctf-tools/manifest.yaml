name: ctf-tools
category: tools
ecosystem: general
description: CTF 常用工具集
maintainer: lenschain-platform
license: MIT
official_source: lenschain/ctf-tools
registry_project: tools

versions:
  - version: "1.0"
    tag: "v1.0.0"
    upstream_tag: "v1.0.0"
    min_cpu: "0.25"
    min_memory: "256Mi"
    recommended_cpu: "0.5"
    recommended_memory: "512Mi"
    is_default: true

default_ports: []
default_env_vars: []
conditional_env_vars: []
default_volumes: []

typical_companions:
  required: []
  recommended: []
  optional: []

required_dependencies: []
supported_tools: []

healthcheck:
  test: ["CMD", "python3", "--version"]
  interval: 60s
  timeout: 5s
  retries: 1
  start_period: 5s

documentation_url: /docs/images/ctf-tools
prepull_phase: 1
prepull_node_tier: light

security_scan:
  enabled: true
  allow_critical: true
  allow_high: true
