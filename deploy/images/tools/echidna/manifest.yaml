name: echidna
category: tools
ecosystem: ethereum
description: Echidna 智能合约模糊测试工具
maintainer: lenschain-platform
license: AGPL-3.0
official_source: crytic/echidna
registry_project: tools

versions:
  - version: "v2.2.4"
    tag: "v2.2.4"
    upstream_tag: "v2.2.4"
    min_cpu: "0.25"
    min_memory: "256Mi"
    recommended_cpu: "0.5"
    recommended_memory: "512Mi"
    is_default: true

default_ports: []
default_env_vars: []
conditional_env_vars: []
default_volumes: []

typical_companions:
  required: []
  recommended:
    - image: solidity-dev
      reason: Solidity 开发环境
  optional: []

required_dependencies: []
supported_tools: []

healthcheck:
  test: ["CMD", "echidna", "--version"]
  interval: 60s
  timeout: 5s
  retries: 1
  start_period: 5s

documentation_url: /docs/images/echidna
prepull_phase: 1
prepull_node_tier: light

security_scan:
  enabled: true
  allow_critical: false
  allow_high: true
