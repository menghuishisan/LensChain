name: substrate-node
category: chain-nodes
ecosystem: polkadot
description: Substrate/Polkadot 节点
maintainer: lenschain-platform
license: GPL-3.0
official_source: paritytech/polkadot-sdk
registry_project: chain-nodes

versions:
  - version: "1.7"
    tag: "v1.7.0"
    upstream_tag: "v1.7.0"
    min_cpu: "0.25"
    min_memory: "512Mi"
    recommended_cpu: "0.5"
    recommended_memory: "1Gi"
    is_default: true

default_ports:
  - port: 9944
    protocol: tcp
    name: WebSocket-RPC
    description: WebSocket RPC
  - port: 9933
    protocol: tcp
    name: HTTP-RPC
    description: HTTP RPC
  - port: 30333
    protocol: tcp
    name: P2P
    description: P2P 通信

default_env_vars: []
conditional_env_vars: []

default_volumes:
  - mount_path: /data
    purpose: chain_data
    size: 10Gi
    description: 链数据持久化

typical_companions:
  required: []
  recommended: []
  optional: []

required_dependencies: []
supported_tools: []

healthcheck:
  test: ["CMD-SHELL", "curl -fsS http://localhost:9933/health"]
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 30s

documentation_url: /docs/images/substrate-node
prepull_phase: 2
prepull_node_tier: heavy

security_scan:
  enabled: true
  allow_critical: false
  allow_high: true
