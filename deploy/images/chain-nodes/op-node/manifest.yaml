name: op-node
category: chain-nodes
ecosystem: ethereum
description: Optimism OP Node L2 节点
maintainer: lenschain-platform
license: MIT
official_source: ethereum-optimism/optimism
registry_project: chain-nodes

versions:
  - version: "1.7"
    tag: "v1.7.0"
    upstream_tag: "v1.7.0"
    min_cpu: "0.25"
    min_memory: "512Mi"
    recommended_cpu: "0.5"
    recommended_memory: "1Gi"
    is_default: true

default_ports:
  - port: 8545
    protocol: tcp
    name: HTTP-RPC
    description: HTTP JSON-RPC API
  - port: 9003
    protocol: tcp
    name: P2P
    description: P2P 通信

default_env_vars: []
conditional_env_vars: []

default_volumes:
  - mount_path: /data
    purpose: chain_data
    size: 10Gi
    description: 链数据持久化

typical_companions:
  required:
    - image: geth
      reason: OP Node 需要 L1 执行层客户端
  recommended: []
  optional: []

required_dependencies:
  - geth

supported_tools:
  - blockscout

healthcheck:
  test: ["CMD-SHELL", "wget -qO- http://localhost:8545/healthz"]
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 30s

documentation_url: /docs/images/op-node
prepull_phase: 3
prepull_node_tier: heavy

security_scan:
  enabled: true
  allow_critical: false
  allow_high: true
