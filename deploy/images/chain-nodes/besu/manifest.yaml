name: besu
category: chain-nodes
ecosystem: ethereum
description: Hyperledger Besu 以太坊客户端
maintainer: lenschain-platform
license: Apache-2.0
official_source: hyperledger/besu
registry_project: chain-nodes

versions:
  - version: "24.3"
    tag: "v24.3.0"
    upstream_tag: "24.3.0"
    min_cpu: "0.25"
    min_memory: "512Mi"
    recommended_cpu: "0.5"
    recommended_memory: "1Gi"
    is_default: true

default_ports:
  - port: 8545
    protocol: tcp
    name: HTTP-RPC
    description: HTTP JSON-RPC API
  - port: 8546
    protocol: tcp
    name: WebSocket-RPC
    description: WebSocket JSON-RPC API
  - port: 30303
    protocol: tcp
    name: P2P
    description: P2P 发现与通信

default_env_vars: []
conditional_env_vars: []

default_volumes:
  - mount_path: /opt/besu/data
    purpose: chain_data
    size: 10Gi
    description: 链数据持久化

typical_companions:
  required: []
  recommended:
    - image: blockscout
      reason: 本地区块链浏览器
  optional:
    - image: remix-ide
      reason: Solidity IDE

required_dependencies: []
supported_tools:
  - remix-ide
  - blockscout
  - slither
  - mythril

healthcheck:
  test: ["CMD-SHELL", "curl -fsS http://localhost:8545"]
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 30s

documentation_url: /docs/images/besu
prepull_phase: 1
prepull_node_tier: light

security_scan:
  enabled: true
  allow_critical: false
  allow_high: true
