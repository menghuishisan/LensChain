name: chainmaker-node
category: chain-nodes
ecosystem: chainmaker
description: 长安链 ChainMaker 节点
maintainer: lenschain-platform
license: Apache-2.0
official_source: chainmakerofficial/chainmaker
registry_project: chain-nodes

versions:
  - version: "2.3"
    tag: "v2.3.0"
    upstream_tag: "v2.3.0"
    min_cpu: "0.25"
    min_memory: "256Mi"
    recommended_cpu: "0.5"
    recommended_memory: "512Mi"
    is_default: true

default_ports:
  - port: 11301
    protocol: tcp
    name: gRPC
    description: gRPC 服务端口
  - port: 12301
    protocol: tcp
    name: RPC
    description: RPC 服务端口

default_env_vars: []
conditional_env_vars: []

default_volumes:
  - mount_path: /chainmaker/data
    purpose: chain_data
    size: 10Gi
    description: 链数据持久化

typical_companions:
  required: []
  recommended:
    - image: chainmaker-explorer
      reason: 长安链浏览器
  optional: []

required_dependencies: []
supported_tools:
  - chainmaker-explorer

healthcheck:
  test: ["CMD-SHELL", "curl -fsS http://localhost:12301/health"]
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 30s

documentation_url: /docs/images/chainmaker-node
prepull_phase: 1
prepull_node_tier: light

security_scan:
  enabled: true
  allow_critical: false
  allow_high: true
