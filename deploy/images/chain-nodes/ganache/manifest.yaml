name: ganache
category: chain-nodes
ecosystem: ethereum
description: Ganache 以太坊模拟器
maintainer: lenschain-platform
license: MIT
official_source: trufflesuite/ganache
registry_project: chain-nodes

versions:
  - version: "7.9"
    tag: "v7.9.2"
    upstream_tag: "v7.9.2"
    min_cpu: "0.1"
    min_memory: "256Mi"
    recommended_cpu: "0.25"
    recommended_memory: "512Mi"
    is_default: true

default_ports:
  - port: 8545
    protocol: tcp
    name: HTTP-RPC
    description: HTTP JSON-RPC API

default_env_vars: []
conditional_env_vars: []

default_volumes:
  - mount_path: /app/db
    purpose: chain_data
    size: 5Gi
    description: 链数据持久化

typical_companions:
  required: []
  recommended:
    - image: remix-ide
      reason: Solidity IDE，可直接连接 Ganache
  optional:
    - image: blockscout
      reason: 区块链浏览器

required_dependencies: []
supported_tools:
  - remix-ide
  - blockscout
  - slither
  - mythril

healthcheck:
  test: ["CMD-SHELL", "wget -qO- http://localhost:8545 --post-data='{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"eth_blockNumber\",\"params\":[]}' --header='Content-Type: application/json'"]
  interval: 30s
  timeout: 5s
  retries: 3
  start_period: 10s

documentation_url: /docs/images/ganache
prepull_phase: 1
prepull_node_tier: light

security_scan:
  enabled: true
  allow_critical: false
  allow_high: true
