name: fabric-peer
category: chain-nodes
ecosystem: fabric
description: Hyperledger Fabric Peer 节点
maintainer: lenschain-platform
license: Apache-2.0
official_source: hyperledger/fabric-peer
registry_project: chain-nodes

versions:
  - version: "2.5"
    tag: "v2.5"
    upstream_tag: "2.5"
    min_cpu: "0.25"
    min_memory: "256Mi"
    recommended_cpu: "0.5"
    recommended_memory: "512Mi"
    is_default: true

default_ports:
  - port: 7051
    protocol: tcp
    name: gRPC
    description: Peer gRPC 服务
  - port: 7053
    protocol: tcp
    name: Event
    description: 事件服务

default_env_vars:
  - key: CORE_PEER_ID
    default_value: peer0.org1.example.com
    description: Peer 节点 ID
    required: false

conditional_env_vars: []

default_volumes:
  - mount_path: /var/hyperledger/production
    purpose: chain_data
    size: 10Gi
    description: Peer 数据持久化

typical_companions:
  required:
    - image: fabric-orderer
      reason: 排序服务
  recommended:
    - image: couchdb
      reason: 状态数据库（替代 LevelDB）
    - image: fabric-ca
      reason: 证书颁发
  optional:
    - image: fabric-explorer
      reason: Fabric 区块链浏览器
    - image: fabric-tools
      reason: Fabric CLI 工具

required_dependencies:
  - fabric-orderer

supported_tools:
  - fabric-explorer
  - fabric-tools
  - caliper

healthcheck:
  test: ["CMD", "peer", "node", "status"]
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 30s

documentation_url: /docs/images/fabric-peer
prepull_phase: 1
prepull_node_tier: light

security_scan:
  enabled: true
  allow_critical: false
  allow_high: true
