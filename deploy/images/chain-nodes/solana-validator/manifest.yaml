name: solana-validator
category: chain-nodes
ecosystem: solana
description: Solana 验证节点
maintainer: lenschain-platform
license: Apache-2.0
official_source: solanalabs/solana
registry_project: chain-nodes

versions:
  - version: "1.18"
    tag: "v1.18.15"
    upstream_tag: "v1.18.15"
    min_cpu: "0.5"
    min_memory: "1Gi"
    recommended_cpu: "1"
    recommended_memory: "2Gi"
    is_default: true

default_ports:
  - port: 8899
    protocol: tcp
    name: JSON-RPC
    description: JSON-RPC API
  - port: 8900
    protocol: tcp
    name: WebSocket
    description: WebSocket API
  - port: 8001
    protocol: tcp
    name: Gossip
    description: Gossip 协议

default_env_vars: []
conditional_env_vars: []

default_volumes:
  - mount_path: /var/solana/data
    purpose: chain_data
    size: 20Gi
    description: 链数据持久化

typical_companions:
  required: []
  recommended: []
  optional: []

required_dependencies: []
supported_tools: []

healthcheck:
  test: ["CMD-SHELL", "curl -fsS http://localhost:8899 -X POST -H 'Content-Type: application/json' -d '{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"getHealth\"}'"]
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 60s

documentation_url: /docs/images/solana-validator
prepull_phase: 2
prepull_node_tier: heavy

security_scan:
  enabled: true
  allow_critical: false
  allow_high: true
