# image.yaml
# 实验环境 — Hyperledger Besu 节点镜像元数据

name: besu
module: experiment
category: chain-nodes
runtime: evm
default_ports:
  - port: 8545
    protocol: tcp
    name: HTTP RPC
  - port: 8546
    protocol: tcp
    name: WebSocket RPC
  - port: 30303
    protocol: tcp
    name: P2P
ports:
  - 8545/tcp
  - 8546/tcp
  - 30303/tcp
default_env_vars:
  - key: NETWORK
    value: dev
    desc: 教学开发网络
  - key: RPC_HTTP_ENABLED
    value: "true"
    desc: 启用 HTTP RPC
required_dependencies: []
typical_companions:
  required: []
  recommended:
    - image: blockscout
      reason: 提供区块链浏览器能力
    - image: remix-ide
      reason: 便于在线合约开发与部署
  optional:
    - image: prometheus
      reason: 指标采集
    - image: grafana
      reason: 监控面板展示
resource_recommendation:
  cpu: 0.5
  memory: 1Gi
  disk: 2Gi
default_volumes:
  - path: /opt/besu/data
    desc: 链数据目录
description: Hyperledger Besu 企业级 EVM 客户端镜像。
