# image.yaml
# 实验环境 — Geth 教学开发链镜像元数据

name: geth-dev
module: experiment
category: chain-nodes
runtime: evm
default_ports:
  - port: 8545
    protocol: tcp
    name: HTTP RPC
  - port: 8546
    protocol: tcp
    name: WebSocket RPC
  - port: 30303
    protocol: tcp
    name: P2P
ports:
  - 8545/tcp
  - 8546/tcp
  - 30303/tcp
default_env_vars:
  - key: NETWORK_ID
    value: "1337"
    desc: 开发链网络 ID
  - key: HTTP_API
    value: eth,net,web3,personal,debug,txpool
    desc: 开放的 HTTP RPC API
  - key: ALLOW_INSECURE_UNLOCK
    value: "true"
    desc: 教学环境允许 HTTP 解锁账户
required_dependencies: []
typical_companions:
  required: []
  recommended:
    - image: blockscout
      reason: 浏览链上交易与区块
    - image: remix-ide
      reason: 在线编写与部署合约
  optional:
    - image: prometheus
      reason: 采集链节点指标
    - image: grafana
      reason: 展示节点运行指标
resource_recommendation:
  cpu: 0.5
  memory: 1Gi
  disk: 2Gi
default_volumes:
  - path: /root/.ethereum
    desc: 链数据目录
description: 适用于实验环境的 Geth 开发模式镜像。
