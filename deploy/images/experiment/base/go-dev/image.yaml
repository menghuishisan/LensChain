# image.yaml
name: go-dev
module: experiment
category: base
runtime: go-dev
default_ports: []
ports: []
default_env_vars:
  - key: GOPATH
    value: /go
    desc: Go 工作目录
required_dependencies: []
typical_companions:
  required: []
  recommended:
    - image: fabric-peer
      reason: 搭配 Fabric SDK 开发实验
    - image: chainmaker-node
      reason: 搭配长安链 SDK 开发实验
  optional:
    - image: code-server
      reason: 提供在线 IDE 能力
resource_recommendation:
  cpu: 0.5
  memory: 1Gi
default_volumes:
  - path: /workspace
    desc: Go 项目工作目录
description: Go + Fabric SDK + ChainMaker SDK 教学开发基础镜像。
