# image.yaml
name: xterm-server
module: experiment
category: tools
runtime: terminal
default_ports:
  - port: 3000
    protocol: tcp
    name: HTTP
ports:
  - 3000/tcp
default_env_vars: []
required_dependencies: []
typical_companions:
  required: []
  recommended:
    - image: code-server
      reason: 提供终端与 IDE 组合交互
    - image: geth-dev
      reason: 直接通过终端连接链环境
  optional: []
resource_recommendation:
  cpu: 0.25
  memory: 256Mi
default_volumes:
  - path: /workspace
    desc: 终端工作目录
description: Web 终端服务镜像。
