# image.yaml
name: fabric-tools
module: experiment
category: tools
runtime: fabric-tools
default_ports: []
ports: []
default_env_vars:
  - key: FABRIC_CFG_PATH
    value: /etc/hyperledger/fabric
    desc: Fabric 配置目录
required_dependencies: []
typical_companions:
  required: []
  recommended:
    - image: fabric-peer
      reason: 通过 CLI 管理 Peer 与通道
    - image: fabric-orderer
      reason: 配置通道与排序服务
  optional:
    - image: fabric-ca
      reason: 配置身份与证书
resource_recommendation:
  cpu: 0.25
  memory: 256Mi
default_volumes:
  - path: /etc/hyperledger/fabric
    desc: Fabric 配置目录
description: Fabric CLI 工具集镜像。
