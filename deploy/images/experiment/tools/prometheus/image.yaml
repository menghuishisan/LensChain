# image.yaml
name: prometheus
module: experiment
category: tools
runtime: monitoring
default_ports:
  - port: 9090
    protocol: tcp
    name: HTTP
ports:
  - 9090/tcp
default_env_vars: []
required_dependencies: []
typical_companions:
  required: []
  recommended:
    - image: grafana
      reason: 作为可视化默认监控组合
  optional:
    - image: geth-dev
      reason: 采集链节点监控指标
resource_recommendation:
  cpu: 0.25
  memory: 256Mi
  disk: 2Gi
default_volumes:
  - path: /prometheus
    desc: Prometheus 数据目录
description: 指标采集与存储镜像。
