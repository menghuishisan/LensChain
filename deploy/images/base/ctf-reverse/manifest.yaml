name: ctf-reverse
category: base
ecosystem: general
description: CTF Reverse 方向基础镜像
maintainer: lenschain-platform
license: MIT
official_source: lenschain/ctf-reverse
registry_project: base

versions:
  - version: "1.0"
    tag: "v1.0.0"
    upstream_tag: "v1.0.0"
    min_cpu: "0.25"
    min_memory: "512Mi"
    recommended_cpu: "0.5"
    recommended_memory: "1Gi"
    is_default: true

default_ports: []
default_env_vars: []
conditional_env_vars: []
default_volumes: []

typical_companions:
  required: []
  recommended:
    - image: ghidra-server
      reason: Ghidra 逆向工程 Web
    - image: radare2
      reason: 逆向分析
  optional: []

required_dependencies: []
supported_tools: []

healthcheck:
  test: ["CMD", "python3", "--version"]
  interval: 60s
  timeout: 5s
  retries: 1
  start_period: 5s

documentation_url: /docs/images/ctf-reverse
prepull_phase: 1
prepull_node_tier: light

security_scan:
  enabled: true
  allow_critical: true
  allow_high: true
