name: ctf-web
category: base
ecosystem: general
description: CTF Web 方向基础镜像
maintainer: lenschain-platform
license: MIT
official_source: lenschain/ctf-web
registry_project: base

versions:
  - version: "1.0"
    tag: "v1.0.0"
    upstream_tag: "v1.0.0"
    min_cpu: "0.25"
    min_memory: "256Mi"
    recommended_cpu: "0.5"
    recommended_memory: "512Mi"
    is_default: true

default_ports:
  - port: 80
    protocol: tcp
    name: HTTP
    description: Web 服务端口
  - port: 8080
    protocol: tcp
    name: App
    description: 应用服务端口

default_env_vars: []
conditional_env_vars: []
default_volumes: []

typical_companions:
  required: []
  recommended:
    - image: mysql
      reason: 数据库
  optional:
    - image: redis
      reason: 缓存

required_dependencies: []
supported_tools: []

healthcheck:
  test: ["CMD-SHELL", "curl -fsS http://localhost:80/ || curl -fsS http://localhost:8080/"]
  interval: 30s
  timeout: 5s
  retries: 3
  start_period: 10s

documentation_url: /docs/images/ctf-web
prepull_phase: 1
prepull_node_tier: light

security_scan:
  enabled: true
  allow_critical: true
  allow_high: true
