name: circom-dev
category: base
ecosystem: general
description: Circom 零知识证明开发环境镜像
maintainer: lenschain-platform
license: MIT
official_source: lenschain/circom-dev
registry_project: base

versions:
  - version: "1.0"
    tag: "v1.0.0"
    upstream_tag: "v1.0.0"
    min_cpu: "0.25"
    min_memory: "512Mi"
    recommended_cpu: "0.5"
    recommended_memory: "1Gi"
    is_default: true

default_ports: []
default_env_vars: []
conditional_env_vars: []

default_volumes:
  - mount_path: /home/developer/project
    purpose: project_data
    size: 5Gi
    description: 项目工作目录

typical_companions:
  required: []
  recommended: []
  optional: []

required_dependencies: []
supported_tools: []

healthcheck:
  test: ["CMD", "node", "--version"]
  interval: 60s
  timeout: 5s
  retries: 1
  start_period: 5s

documentation_url: /docs/images/circom-dev
prepull_phase: 3
prepull_node_tier: light

security_scan:
  enabled: true
  allow_critical: false
  allow_high: true
