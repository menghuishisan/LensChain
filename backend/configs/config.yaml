# config.yaml
# 链镜平台后端默认配置文件
# 环境变量覆盖前缀：LENSCHAIN_（如 LENSCHAIN_DATABASE_HOST）

server:
  host: "0.0.0.0"
  port: 3000
  mode: "debug"                      # debug / release / test
  read_timeout: 10s
  write_timeout: 10s
  max_header_bytes: 1048576          # 1MB

database:
  host: "localhost"
  port: 5432
  user: "lenschain"
  password: "lenschain"
  dbname: "lenschain"
  sslmode: "disable"
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime: "1h"
  log_level: "warn"                  # silent / error / warn / info

redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 0
  pool_size: 100
  min_idle_conns: 10

jwt:
  access_secret: "lenschain-access-secret-change-in-production"
  refresh_secret: "lenschain-refresh-secret-change-in-production"
  access_expire: "30m"               # Access Token 30分钟
  refresh_expire: "168h"             # Refresh Token 7天
  temp_expire: "5m"                  # 临时Token 5分钟（首次登录改密）
  issuer: "lenschain"

minio:
  endpoint: "localhost:9000"
  access_key: "minioadmin"
  secret_key: "minioadmin"
  use_ssl: false
  bucket: "lenschain"
  region: "us-east-1"

nats:
  url: "nats://localhost:4222"
  max_reconnects: 60
  reconnect_wait: "2s"

snowflake:
  node_id: 1

log:
  level: "info"                      # debug / info / warn / error
  format: "json"                     # json / console
  output: "stdout"                   # stdout / file
  file_path: "logs/app.log"
  max_size: 100                      # MB
  max_backups: 30
  max_age: 7                         # 天
  compress: true

sms:
  provider: "mock"                   # mock / aliyun / tencent
  access_key: ""
  secret_key: ""
  sign_name: "链镜平台"
  region: ""

cors:
  allowed_origins:
    - "http://localhost:3000"
  allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "PATCH"
    - "DELETE"
    - "OPTIONS"
  allowed_headers:
    - "Authorization"
    - "Content-Type"
  max_age: "12h"

rate_limit:
  enabled: true
  requests_per_second: 100
  burst: 200

k8s:
  in_cluster: false                    # true=集群内部署（使用 ServiceAccount），false=外部（使用 kubeconfig）
  kubeconfig_path: ""                  # 外部模式时 kubeconfig 路径，为空则使用 ~/.kube/config
  namespace_prefix: "lenschain-exp"    # 实验命名空间前缀
  default_cpu: "500m"                  # 默认容器 CPU 限制
  default_memory: "512Mi"              # 默认容器内存限制
  collector_image_template: "registry.lianjing.com/collector-agents/%s:latest" # 混合实验 Collector Agent 镜像模板
  timeout: "30s"                       # K8s API 超时

sim_engine:
  grpc_addr: "localhost:50051"         # SimEngine Core gRPC 地址
  timeout: "10s"                       # gRPC 调用超时
  max_retries: 3                       # 最大重试次数
  tls_enabled: false                   # 是否启用 TLS
  cert_file: ""                        # TLS 证书路径
